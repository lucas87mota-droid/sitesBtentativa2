<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #F4F6F8;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.card {
  background: #ffffff;
  border: 1px solid #E2E8F0;
  border-radius: 16px;
  padding: 2.5rem 2.75rem;
  max-width: 520px;
  width: 100%;
  box-shadow: 0 2px 16px rgba(15,23,42,0.06);
}

.badge {
  display: inline-block;
  background: #F1F5F9;
  color: #475569;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid #E2E8F0;
  margin-bottom: 1rem;
}

h1 {
  font-size: 1.5rem;
  font-weight: bold;
  color: #0F172A;
  margin-bottom: 0.35rem;
  line-height: 1.3;
}

.subtitle {
  font-size: 14px;
  color: #64748B;
  line-height: 1.6;
  margin-bottom: 1.75rem;
}

.divider {
  height: 1px;
  background: #E2E8F0;
  margin: 1.5rem 0;
}

.section-label {
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #94A3B8;
  margin-bottom: 0.75rem;
}

/* Stars */
.stars {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 4px;
  margin-bottom: 0.5rem;
}

.stars input[type="radio"] { display: none; }

.stars label {
  font-size: 32px;
  color: #E2E8F0;
  cursor: pointer;
  transition: color 0.12s, transform 0.12s;
  line-height: 1;
}

.stars label:hover,
.stars label:hover ~ label,
.stars input:checked ~ label {
  color: #0F172A;
  transform: scale(1.1);
}

.star-hint {
  font-size: 12px;
  color: #94A3B8;
  font-style: italic;
  min-height: 18px;
}

/* Choices */
.choices { display: flex; flex-direction: column; gap: 6px; }

.choices input[type="checkbox"] { display: none; }

.choices label {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border: 1px solid #E2E8F0;
  border-radius: 10px;
  cursor: pointer;
  background: #ffffff;
  font-size: 14px;
  color: #334155;
  transition: background 0.12s, border-color 0.12s;
}

.choices label:hover { background: #F8FAFC; border-color: #CBD5E1; }

.choices input:checked + label {
  background: #F8FAFC;
  border-color: #0F172A;
  color: #0F172A;
  font-weight: bold;
}

.choice-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: #F1F5F9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  transition: background 0.12s;
}

.choices input:checked + label .choice-icon {
  background: #E2E8F0;
}

/* Textarea */
textarea {
  width: 100%;
  min-height: 96px;
  border: 1px solid #E2E8F0;
  border-radius: 10px;
  padding: 11px 14px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  color: #0F172A;
  background: #ffffff;
  resize: vertical;
  outline: none;
  line-height: 1.6;
  transition: border-color 0.15s;
}

textarea::placeholder { color: #CBD5E1; }
textarea:focus { border-color: #94A3B8; }

/* Submit */
.submit-btn {
  display: block;
  width: 100%;
  padding: 13px;
  background: #0F172A;
  color: #ffffff;
  border: none;
  border-radius: 10px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.15s, transform 0.1s;
  text-align: center;
}

.submit-btn:hover { background: #1E293B; transform: translateY(-1px); }
.submit-btn:active { transform: scale(0.99); }
</style>
</head>
<body>

<div class="card">

  <div class="badge">Feedback</div>
  <h1>Como foi sua experiência?</h1>
  <p class="subtitle">Sua opinião nos ajuda a melhorar. Leva menos de 1 minuto.</p>

  <form action="#" method="post">

    <div class="section-label">Avaliação geral</div>
    <div class="stars">
      <input type="radio" name="rating" id="s5" value="5">
      <label for="s5" title="Excelente">★</label>
      <input type="radio" name="rating" id="s4" value="4">
      <label for="s4" title="Bom">★</label>
      <input type="radio" name="rating" id="s3" value="3">
      <label for="s3" title="Regular">★</label>
      <input type="radio" name="rating" id="s2" value="2">
      <label for="s2" title="Ruim">★</label>
      <input type="radio" name="rating" id="s1" value="1">
      <label for="s1" title="Péssimo">★</label>
    </div>
    <p class="star-hint">Clique em uma estrela para avaliar</p>

    <div class="divider"></div>

    <div class="section-label">O que mais te agradou?</div>
    <div class="choices">
      <input type="checkbox" name="choice" id="c1" value="atendimento">
      <label for="c1"><span class="choice-icon">🤝</span> Atendimento e suporte</label>

      <input type="checkbox" name="choice" id="c2" value="qualidade">
      <label for="c2"><span class="choice-icon">💎</span> Qualidade do produto</label>

      <input type="checkbox" name="choice" id="c3" value="rapidez">
      <label for="c3"><span class="choice-icon">⚡</span> Rapidez na entrega</label>

      <input type="checkbox" name="choice" id="c4" value="preco">
      <label for="c4"><span class="choice-icon">🏷️</span> Custo-benefício</label>

      <input type="checkbox" name="choice" id="c5" value="experiencia">
      <label for="c5"><span class="choice-icon">✨</span> Experiência geral</label>
    </div>

    <div class="divider"></div>

    <div class="section-label">Comentário livre</div>
    <textarea name="comment" placeholder="Sugestões, elogios ou críticas são bem-vindos..."></textarea>

    <div class="divider"></div>

    <button type="submit" class="submit-btn">Enviar feedback</button>

  </form>

</div>

</body>
</html>
